{% extends 'base.html' %}

{% block title %}Иловаи Китоб - BookHub{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <a href="{% url 'list_book' %}" class="flex items-center text-sm text-gray-400 hover:text-indigo-400 transition mb-6 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Бозгашт ба рӯйхати китобҳо
    </a>

    <div class="bg-slate-800/40 border border-slate-700 rounded-3xl p-8 shadow-2xl">
        <div class="mb-8 border-b border-slate-700 pb-6">
            <h1 class="text-3xl font-bold text-white">Иловаи Китоби Нав</h1>
            <p class="text-gray-400 mt-2">Ҳамаи майдонҳоро пур кунед, то китоб ба каталог илова шавад.</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Номи китоб</label>
                    <input type="text" name="title" required
                           class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Муаллиф</label>
                    <select name="author" required
                            class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <option value="" disabled selected>Интихоб кунед...</option>
                        {% for author in authors %}
                            <option value="{{ author.id }}">{{ author.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Категория</label>
                    <select name="category" required
                            class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <option value="" disabled selected>Интихоб кунед...</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Нарх ($)</label>
                    <input type="number" step="0.01" name="price" required
                           class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Расми муқова</label>
                    <input type="file" name="cover_image" accept="image/*"
                           class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Тавсифи китоб</label>
                <textarea name="description" rows="5" required
                          class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition resize-none"></textarea>
            </div>

            <div class="flex items-center gap-4 pt-6 border-t border-slate-700">
                <button type="submit" class="flex-1 btn-premium py-4 rounded-xl font-bold text-white shadow-lg">
                    Илова кардан
                </button>
                <a href="{% url 'list_book' %}" class="px-8 py-4 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold transition">
                    Инкор
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
