{% extends 'base.html' %}

{% block title %}Таҳрири шарҳ - BookHub{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-12">
    <a href="{% url 'detail_book' review.book.id %}" class="flex items-center text-sm text-gray-400 hover:text-indigo-400 transition mb-8 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Бозгашт ба китоб
    </a>

    <div class="bg-slate-800/40 border border-slate-700 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute -bottom-20 -left-20 w-48 h-48 bg-indigo-500/5 blur-3xl rounded-full"></div>

        <div class="relative z-10">
            <div class="mb-8 border-b border-slate-700 pb-6">
                <h1 class="text-2xl font-bold text-white">Таҳрири шарҳ</h1>
                <p class="text-gray-400 mt-2">Шумо шарҳи худро барои китоби <span class="text-white font-semibold">"{{ review.book.title }}"</span> тағйир дода истодаед.</p>
            </div>

            <form method="POST" class="space-y-8">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-4">Баҳоро навсозӣ кунед</label>
                    <div class="flex gap-4">
                        {% for i in "12345" %}
                        <label class="relative cursor-pointer group">
                            <input type="radio" name="rating" value="{{ i }}" required 
                                   class="peer sr-only" 
                                   {% if review.rating|stringformat:"i" == i %}checked{% endif %}>
                            
                            <div class="w-12 h-12 flex items-center justify-center bg-slate-900 border border-slate-700 rounded-xl text-gray-400 peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-500 group-hover:border-indigo-400 transition-all font-bold">
                                {{ i }}
                            </div>
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div>
                    <label for="text" class="block text-sm font-medium text-gray-300 mb-2">Матни шарҳ</label>
                    <textarea name="text" id="text" rows="6" required
                              class="w-full bg-slate-900 border border-slate-700 text-white rounded-2xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition resize-none">{{ review.text }}</textarea>
                </div>

                <div class="flex items-center gap-4 pt-4">
                    <button type="submit" class="flex-1 btn-premium py-4 rounded-2xl font-bold text-white shadow-lg">
                        Захира кардани тағйирот
                    </button>
                    <a href="{% url 'detail_book' review.book.id %}" class="px-6 py-4 text-gray-500 hover:text-white transition font-medium">
                        Инкор
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
