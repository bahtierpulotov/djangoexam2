<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ивази парол | Premium Dark</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #fbbf24; /* Ранги тиллоӣ/зард барои огоҳӣ ва тағйирот */
            --accent-hover: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --input-bg: #334155;
            --error-color: #f43f5e;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Эффекти нури тиллоӣ дар замина */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(160px);
            opacity: 0.08;
            top: 20%;
            right: 20%;
            z-index: -1;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-dim);
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
        }

        .btn-change {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-change:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(251, 191, 36, 0.3);
        }

        .back-link {
            display: block;
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }

        /* Паёмҳои Django */
        .messages {
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .message {
            padding: 0.8rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .error { background: rgba(244, 63, 94, 0.15); color: #fb7185; }
        .success { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Ивази парол</h2>
        <p class="subtitle">Барои бехатарӣ пароли худро мунтазам нав кунед.</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form action="{% url 'change_password' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="current_password">Пароли ҷорӣ</label>
                <input type="password" id="current_password" name="current_password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="new_password">Пароли нав</label>
                <input type="password" id="new_password" name="new_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-change">Навсозии парол</button>
        </form>

        <a href="javascript:history.back()" class="back-link">← Бозгашт</a>
    </div>

</body>
</html>
