<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пароли нав | Premium Dark</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #10b981; /* Ранги сабз барои нишон додани навсозӣ */
            --accent-hover: #059669;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --input-bg: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Эффекти нури дурахшон дар замина */
        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            filter: blur(180px);
            opacity: 0.1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            position: relative;
        }

        h2 {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
            color: #fff;
        }

        p.subtitle {
            color: var(--text-dim);
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.8rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 0.8rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3);
        }

        /* Паёмҳои Django */
        .messages {
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .message {
            padding: 0.8rem;
            border-radius: 0.8rem;
            font-size: 0.85rem;
            text-align: center;
            background: rgba(244, 63, 94, 0.2);
            color: #fb7185;
            border: 1px solid rgba(244, 63, 94, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Пароли нав</h2>
        <p class="subtitle">Лутфан пароли нави худро ворид кунед ва онро дар хотир нигоҳ доред.</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="password">Пароли нави шумо</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Тасдиқи парол</label>
                <input type="password" id="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Сабти пароли нав</button>
        </form>
    </div>

    <script>
        // Иловаи тафтиши хурд барои мувофиқати паролҳо дар браузер
        const form = document.querySelector('form');
        const pass = document.getElementById('password');
        const confirmPass = document.getElementById('confirm_password');

        form.addEventListener('submit', function(e) {
            if (pass.value !== confirmPass.value) {
                e.preventDefault();
                alert('Паролҳо бо ҳам мувофиқат намекунанд!');
            }
        });
    </script>

</body>
</html>
